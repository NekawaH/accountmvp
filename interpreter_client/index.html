<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pseudocode IDE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Pseudocode IDE</h1>

    <div class="panel">
        <div style="flex: 1; display: flex; flex-direction: column;">
            <label class="small">Pseudocode</label>
            
            <div class="tabs-container">
                <div id="tabsBar" class="tabs"></div>
                <button id="newFileBtn" class="new-tab-btn">+</button>
            </div>

            <div class="editor-container">
                <div id="lineNumbers">1</div>
                <textarea id="code" wrap="off"></textarea>
            </div>

            <div class="controls">
                <button id="run">Execute</button>
                <button id="showAst">Show AST</button>
                <button id="clearConsole">Clear Console</button>
                <button id="saveCloudBtn" style="background-color: #28a745; color: white;">Save to Cloud</button>
                <label class="small" style="margin-left: 10px;">
                    <input type="checkbox" id="showPrompts" checked> Show Input Prompts
                </label>
            </div>

            <label class="small">Debug</label>
            <pre id="debugOut"></pre>
        </div>

        <div class="sidebar">
            <label class="small">Console</label>
            <div id="console" tabindex="0"></div>

            <div class="row" style="margin-top: 10px">
                <input id="consoleInput" placeholder="Type input here and press Enter" style="flex: 1" type="text" />
            </div>

            <div class="note">When the running program requests <code>INPUT &lt;var&gt;</code>, type value and press Enter.</div>
        </div>

        <div class="copyright">
            &copy; 2026 
            <a href="https://github.com/NekawaH" target="_blank">
                NekawaH
            </a>
            <a href="https://github.com/NekawaH/pseudo_ide" target="_blank">
                <ion-icon name="logo-github"></ion-icon>
            </a>
        </div>
    </div>

    <script src="interpreter.js"></script>
    <script src="indentation.js"></script>
</body>
</html>
